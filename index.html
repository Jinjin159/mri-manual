<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>撮像マニュアル</title>
<style>
:root{
  --blue:#1e3a6e;--blue2:#2563eb;--blue-lt:#eff6ff;--blue-bd:#bfdbfe;
  --gray1:#f8fafc;--gray2:#f1f5f9;--gray3:#e2e8f0;--gray4:#94a3b8;
  --gray5:#64748b;--gray6:#374151;--text:#1e293b;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--gray1);font-family:'Hiragino Kaku Gothic Pro','ヒラギノ角ゴ Pro W3','Hiragino Sans','Yu Gothic UI',sans-serif;color:var(--text)}

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
}

/* ヘッダー */
.header{text-align:center;margin-bottom:40px}
.header-icon{font-size:52px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(30,58,110,.15))}
.header-title{font-size:22px;font-weight:700;color:var(--blue);letter-spacing:-.3px;margin-bottom:6px}
.header-sub{font-size:13px;color:var(--gray5);letter-spacing:.02em}

/* マニュアルカード */
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px}

.manual-card{
  display:flex;align-items:center;gap:16px;
  padding:20px;
  background:white;
  border-radius:var(--radius);
  border:1.5px solid var(--gray3);
  cursor:pointer;
  text-decoration:none;
  color:var(--text);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  position:relative;
  overflow:hidden;
}
.manual-card::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:4px;
  background:var(--card-color);
  border-radius:4px 0 0 4px;
}
.manual-card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  border-color:var(--card-color);
}
.manual-card:active{transform:scale(.98)}

.card-icon{
  width:54px;height:54px;border-radius:14px;
  background:var(--card-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;
}
.card-body{flex:1;min-width:0}
.card-label{font-size:11px;font-weight:600;color:var(--card-color);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.card-title{font-size:18px;font-weight:700;letter-spacing:-.2px;margin-bottom:3px}
.card-desc{font-size:12px;color:var(--gray5);line-height:1.5}
.card-arrow{font-size:18px;color:var(--gray4);flex-shrink:0;transition:transform .2s}
.manual-card:hover .card-arrow{transform:translateX(4px);color:var(--card-color)}

/* フッター */
.footer{margin-top:36px;text-align:center;font-size:11px;color:var(--gray4)}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-icon">🏥</div>
    <div class="header-title">撮像マニュアル</div>
    <div class="header-sub">海の中道整形外科</div>
  </div>

  <div class="cards">

    <a class="manual-card" href="mri.html"
      style="--card-color:#1e3a6e;--card-bg:#eff6ff">
      <div class="card-icon">🧲</div>
      <div class="card-body">
        <div class="card-label">MRI</div>
        <div class="card-title">MRI 撮像マニュアル</div>
        <div class="card-desc">撮像プロトコル・条件設定・注意事項</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="manual-card" href="xp.html"
      style="--card-color:#0891b2;--card-bg:#ecfeff">
      <div class="card-icon">🩻</div>
      <div class="card-body">
        <div class="card-label">XP / CR</div>
        <div class="card-title">一般撮影マニュアル</div>
        <div class="card-desc">ポジショニング・撮影条件・習熟度チェック</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

  <div class="footer">各マニュアルはIDでログインしてください</div>
</div>

</body>
</html>
