<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>検査マニュアル</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;font-family:"Nunito","Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;background:#fff;}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px 48px;}
.header{text-align:center;margin-bottom:36px;animation:fadeUp .5s ease both;}
.hospital{font-size:11px;font-weight:800;letter-spacing:.18em;color:#0891b2;text-transform:uppercase;margin-bottom:6px;}
.title{font-size:22px;font-weight:900;color:#1e3a6e;letter-spacing:-.3px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:320px;animation:fadeUp .5s .1s ease both;}
.card{aspect-ratio:1/1;background:#f8fafc;border-radius:20px;border:2px solid #e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 12px 14px;text-decoration:none;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.card:active{transform:scale(.93);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0;background:var(--accent);}
.card-illust{position:absolute;inset:8px 8px 36px 8px;display:flex;align-items:center;justify-content:center;}
.card-illust img{width:100%;height:100%;object-fit:contain;}
.card-label{font-size:14px;font-weight:900;letter-spacing:.06em;color:var(--accent);position:relative;z-index:1;}
.card-coming{background:#f8fafc;border:2px dashed #e2e8f0;box-shadow:none;cursor:default;pointer-events:none;justify-content:center;gap:6px;}
.card-coming::before{display:none;}
.card-coming .card-label{color:#cbd5e1;font-size:12px;}
.coming-icon{font-size:28px;opacity:.2;}
.footer{margin-top:24px;font-size:11px;color:#94a3b8;text-align:center;animation:fadeUp .5s .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
